services:
  database:
    image: mariadb:lts
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-paymenter}
      MYSQL_USER: ${MYSQL_USER:-paymenter}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - vpay-database:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 10

  cache:
    image: redis:alpine
    restart: unless-stopped
    volumes:
      - vpay-redis:/data

  vpay:
    image: ghcr.io/zoharkiaav/vpay:latest
    restart: unless-stopped
    depends_on:
      database:
        condition: service_healthy
      cache:
        condition: service_started
    ports:
      - "80"
    environment:
      APP_ENV: ${APP_ENV:-production}
      APP_DEBUG: ${APP_DEBUG:-false}
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL}

      DB_CONNECTION: mysql
      DB_HOST: database
      DB_PORT: 3306
      DB_DATABASE: ${MYSQL_DATABASE:-paymenter}
      DB_USERNAME: ${MYSQL_USER:-paymenter}
      DB_PASSWORD: ${MYSQL_PASSWORD}

      CACHE_STORE: redis
      REDIS_HOST: cache
      REDIS_PORT: 6379

      TRUSTED_PROXIES: "*"
    volumes:
      - vpay-storage:/app/var
      - vpay-logs:/app/storage/logs
      - vpay-public:/app/storage/app/public

volumes:
  vpay-database:
  vpay-redis:
  vpay-storage:
  vpay-logs:
  vpay-public: